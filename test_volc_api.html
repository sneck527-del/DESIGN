<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火山引擎API测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        .btn {
            background: #409eff;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background .2s;
        }
        .btn:hover {
            background: #66b1ff;
        }
        .btn.danger {
            background: #f56c6c;
        }
        .btn.danger:hover {
            background: #f78989;
        }
        .result-area {
            margin-top: 30px;
        }
        .result-area h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
        }
        #result {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 15px;
            font-size: 13px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .loading {
            color: #909399;
            font-style: italic;
        }
        .error {
            color: #f56c6c;
        }
        .success {
            color: #67c23a;
        }
        .api-options {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .api-options button {
            flex: 1;
            min-width: 180px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>火山引擎API测试工具</h1>
        
        <div class="form-group">
            <label>API类型</label>
            <select id="apiType">
                <option value="coding">火山Coding Plan（推荐）</option>
                <option value="doubao">普通豆包API</option>
            </select>
        </div>

        <div class="form-group">
            <label>API Key</label>
            <input type="text" id="apiKey" placeholder="请输入你的API Key" value="ark-e78e09ef-81c5-4843-b4b5-8a000b76ba57-4f809">
        </div>

        <div class="form-group">
            <label>模型名称</label>
            <input type="text" id="model" placeholder="请输入模型ID" value="doubao-seed-2-0-lite-260215">
        </div>

        <div class="form-group">
            <label>测试问题</label>
            <textarea id="prompt">你好，请介绍一下你自己</textarea>
        </div>

        <div class="api-options">
            <button class="btn" onclick="testApi()">🔍 测试API连接</button>
            <button class="btn danger" onclick="clearResult()">🧹 清空结果</button>
        </div>

        <div class="result-area">
            <h3>请求结果</h3>
            <div id="result" class="loading">等待测试...</div>
        </div>
    </div>

    <script>
        const apiUrls = {
            coding: 'https://ark.cn-beijing.volces.com/api/coding/chat/completions',
            doubao: 'https://ark.cn-beijing.volces.com/api/v3/chat/completions'
        };

        function clearResult() {
            document.getElementById('result').textContent = '等待测试...';
            document.getElementById('result').className = 'loading';
        }

        async function testApi() {
            const apiType = document.getElementById('apiType').value;
            const apiKey = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('model').value.trim();
            const prompt = document.getElementById('prompt').value.trim();
            const resultEl = document.getElementById('result');

            if (!apiKey) {
                resultEl.textContent = '❌ 错误：请输入API Key';
                resultEl.className = 'error';
                return;
            }

            if (!model) {
                resultEl.textContent = '❌ 错误：请输入模型名称';
                resultEl.className = 'error';
                return;
            }

            resultEl.textContent = '🔄 正在请求API...';
            resultEl.className = 'loading';

            try {
                const startTime = Date.now();
                const response = await fetch(apiUrls[apiType], {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: 'user', content: prompt }
                        ],
                        temperature: 0.7,
                        stream: false
                    })
                });

                const endTime = Date.now();
                const duration = endTime - startTime;

                let responseText = '';
                try {
                    responseText = await response.text();
                } catch (e) {
                    responseText = '无法读取响应内容';
                }

                let result = '';
                result += `⏱️  请求耗时：${duration}ms\n`;
                result += `📡  状态码：${response.status} ${response.statusText}\n`;
                result += `📍  请求地址：${apiUrls[apiType]}\n`;
                result += `🤖  使用模型：${model}\n`;
                result += `\n📝  响应内容：\n`;

                try {
                    const json = JSON.parse(responseText);
                    result += JSON.stringify(json, null, 2);
                    
                    if (response.ok) {
                        if (json.choices && json.choices.length > 0) {
                            result += `\n\n✅  请求成功！AI回复：\n`;
                            result += json.choices[0].message.content;
                        }
                        resultEl.className = 'success';
                    } else {
                        resultEl.className = 'error';
                        if (json.error) {
                            result += `\n\n❌ 错误信息：\n`;
                            result += `错误类型：${json.error.type || '未知'}\n`;
                            result += `错误代码：${json.error.code || '未知'}\n`;
                            result += `错误详情：${json.error.message || '未知'}`;
                        }
                    }
                } catch (e) {
                    result += responseText;
                    resultEl.className = response.ok ? 'success' : 'error';
                }

                resultEl.textContent = result;

            } catch (e) {
                resultEl.className = 'error';
                resultEl.textContent = `❌ 网络请求失败：\n${e.message}\n\n可能的原因：\n1. 网络连接问题\n2. 跨域限制（建议在本地服务器打开，或安装浏览器跨域插件）\n3. API地址错误`;
            }
        }
    </script>
</body>
</html>
